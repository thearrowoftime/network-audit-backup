!
! core-sw-01 — revised config (for diff demo: NTP/syslog added, ACL tightened)
!
version 15.2
service timestamps debug datetime msec
service timestamps log datetime msec
service password-encryption
hostname core-sw-01
!
enable secret 9 $9$FixedSecretHashDemo01
!
username admin privilege 15 secret 9 $9$AdminSecretHashDemo02
!
no aaa new-model
!
ip domain-name lab.local
!
interface GigabitEthernet0/0
 description UPLINK
 no switchport
 ip address 192.168.1.10 255.255.255.0
!
interface Vlan1
 ip address 192.168.10.1 255.255.255.0
!
no ip http server
!
ip access-list extended EDGE-IN
 permit tcp 192.168.1.0 0.0.0.255 any eq 22
 deny ip any any log
!
ip access-list standard MGMT
 permit 192.168.1.0 0.0.0.255
!
snmp-server group LAB v3 priv
!
ntp server 192.168.1.5
logging host 192.168.1.20
!
no cdp run
!
line con 0
 logging synchronous
line vty 0 4
 access-class MGMT in
 login local
 transport input ssh
!
end
