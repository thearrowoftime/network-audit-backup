!
! Sample Cisco IOS router — hardened baseline (fewer findings)
!
version 15.2
service timestamps debug datetime msec
service timestamps log datetime msec
service password-encryption
hostname edge-rtr-01
!
enable secret 9 $9$AbCdEfGhIjKlMnOp
!
username netadmin privilege 15 secret 9 $9$XyZaBcDeFgHiJkLm
aaa new-model
!
ip domain-name lab.local
ip ssh version 2
!
interface GigabitEthernet0/0
 description WAN
 ip address 203.0.113.1 255.255.255.0
!
interface GigabitEthernet0/1
 description LAN
 ip address 192.168.1.1 255.255.255.0
!
! Least-privilege ACL
ip access-list extended WAN-IN
 permit tcp any host 203.0.113.1 eq 22
 deny ip any any log
!
ip access-list standard MGMT-ONLY
 permit 192.168.1.0 0.0.0.255
 deny any log
!
no ip http server
no cdp run
!
ntp server 192.168.1.5
ntp server 192.168.1.6
!
logging host 192.168.1.20
logging trap informational
!
snmp-server group NETOPS v3 priv
snmp-server user monitor NETOPS v3 auth sha AuthP@ss1 priv aes 128 PrivP@ss1
!
line con 0
 logging synchronous
line vty 0 4
 access-class MGMT-ONLY in
 transport input ssh
 login local
 exec-timeout 5 0
!
end
