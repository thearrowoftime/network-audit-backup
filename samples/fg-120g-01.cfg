# Sample FortiGate 120G / FortiOS config — intentionally insecure (audit demo)
config system global
    set hostname "fg-120g-01"
    set admintimeout 60
end
config system admin
    edit "admin"
        set accprofile "super_admin"
        set password ENC redacted
    next
end
config system interface
    edit "port1"
        set vdom "root"
        set ip 192.168.10.1 255.255.255.0
        set allowaccess ping https http ssh telnet snmp
        set type physical
    next
end
config system snmp community
    edit 1
        set name "public"
        config hosts
            edit 1
                set ip 0.0.0.0 0.0.0.0
            next
        end
    next
end
config firewall policy
    edit 1
        set name "allow-all-any-any"
        set srcintf "any"
        set dstintf "any"
        set srcaddr "all"
        set dstaddr "all"
        set action accept
        set schedule "always"
        set service "ALL"
        set nat enable
    next
end
# Missing: config system ntp, config log syslogd
