!
! Sample Siemens SCALANCE XC208 running-config — intentionally insecure (audit demo)
!
hostname scalance-xc208-01
!
username admin privilege 15 password 0 admin
!
interface vlan 1
 ip address 192.168.20.10 255.255.255.0
!
ip access-list extended MGMT
 permit ip any any
!
snmp-server community public RO
!
! Missing NTP/SNTP and syslog on purpose
!
telnet server enable
ip http server
!
line vty 0 4
 transport input all
 login
!
end
